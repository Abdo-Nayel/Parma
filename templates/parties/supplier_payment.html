{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel"><div class="panel-header"><h3><i class="fas fa-money-bill-wave"></i> سداد مورد</h3></div><div class="panel-body">
<form method="post">{% csrf_token %}
<div class="form-grid">
  <div class="form-group"><label>المورد *</label>
    <select name="supplier" class="form-control" required>
      <option value="">اختر المورد...</option>
      {% for s in suppliers %}<option value="{{ s.pk }}" {% if preselect_supplier == s.pk|stringformat:"s" %}selected{% endif %}>{{ s.code }} — {{ s.name }} (رصيد: {{ s.balance }})</option>{% endfor %}
    </select>
  </div>
  <div class="form-group"><label>التاريخ *</label><input name="date" type="date" class="form-control" required value="{{ today }}"></div>
  <div class="form-group"><label>المبلغ *</label><input name="amount" type="number" step="0.01" min="0.01" class="form-control" required></div>
  <div class="form-group"><label>طريقة السداد *</label>
    <select name="payment_type" id="pay-type" class="form-control">
      <option value="cash">نقدي — الخزنة</option>
      <option value="bank">بنك</option>
    </select>
  </div>
  <div class="form-group" id="bank-group"><label>البنك</label>
    <select name="bank" class="form-control">
      <option value="">—</option>
      {% for b in banks %}<option value="{{ b.pk }}">{{ b.code }} — {{ b.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-group full"><label>ملاحظات</label><input name="notes" class="form-control"></div>
</div>
<button class="btn btn-primary"><i class="fas fa-save"></i> حفظ السداد</button>
<a href="{% url 'supplier_balances' %}" class="btn btn-outline">رجوع</a>
</form></div></div>
<script>
document.getElementById('pay-type')?.addEventListener('change', function() {
  document.getElementById('bank-group').style.display = this.value === 'bank' ? '' : 'none';
});
document.getElementById('pay-type')?.dispatchEvent(new Event('change'));
</script>
{% endblock %}
