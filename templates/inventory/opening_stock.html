{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel"><div class="panel-header"><h3>رصيد افتتاحي</h3></div><div class="panel-body">
<form method="post">{% csrf_token %}
<div class="form-grid">
  <div class="form-group"><label>المخزن *</label><select name="warehouse" class="form-control" required><option value="">اختر...</option>{% for w in warehouses %}<option value="{{ w.pk }}">{{ w.name }}</option>{% endfor %}</select></div>
  <div class="form-group"><label>الصنف *</label><select name="product" class="form-control" required><option value="">اختر...</option>{% for p in products %}<option value="{{ p.pk }}">{{ p.name }}</option>{% endfor %}</select></div>
  <div class="form-group"><label>الكمية *</label><input name="quantity" type="number" step="0.01" class="form-control" required></div>
  <div class="form-group"><label>تكلفة الوحدة</label><input name="unit_cost" type="number" step="0.01" class="form-control"></div>
  <div class="form-group full"><label>ملاحظات</label><input name="notes" class="form-control"></div>
</div>
<button class="btn btn-primary"><i class="fas fa-save"></i> تسجيل</button>
</form></div></div>
{% endblock %}
