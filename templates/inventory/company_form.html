{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel"><div class="panel-header"><h3>{{ page_title }}</h3></div><div class="panel-body">
<form method="post">{% csrf_token %}
<div class="form-grid">
  <div class="form-group"><label>الكود</label><input name="code" class="form-control" value="{% if obj %}{{ obj.code }}{% else %}{{ suggested_code }}{% endif %}"></div>
  <div class="form-group"><label>اسم الشركة *</label><input name="name" class="form-control" required value="{{ obj.name|default:'' }}"></div>
  <div class="form-group"><label>الدولة</label><input name="country" class="form-control" value="{{ obj.country|default:'' }}"></div>
  <div class="form-group"><label>الهاتف</label><input name="phone" class="form-control" value="{{ obj.phone|default:'' }}"></div>
  <div class="form-group"><label class="form-check"><input type="checkbox" name="is_active" {% if not obj or obj.is_active %}checked{% endif %}> نشط</label></div>
</div>
<button class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button> <a href="{% url 'company_list' %}" class="btn btn-outline">رجوع</a>
</form></div></div>
{% endblock %}
