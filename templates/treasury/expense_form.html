{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel"><div class="panel-header"><h3>{{ page_title }}</h3></div><div class="panel-body">
<form method="post">{% csrf_token %}
<div class="form-grid">
  <div class="form-group"><label>البند *</label><select name="category" class="form-control" required>{% for c in categories %}<option value="{{ c.pk }}" {% if obj and obj.category_id == c.pk %}selected{% endif %}>{{ c.code }} — {{ c.name }}</option>{% endfor %}</select></div>
  <div class="form-group"><label>البنك</label><select name="bank" class="form-control"><option value="">—</option>{% for b in banks %}<option value="{{ b.pk }}" {% if obj and obj.bank_id == b.pk %}selected{% endif %}>{{ b.code }} — {{ b.name }}</option>{% endfor %}</select></div>
  <div class="form-group"><label>المبلغ *</label><input name="amount" type="number" step="0.01" class="form-control" required value="{{ obj.amount|default:'' }}"></div>
  <div class="form-group"><label>التاريخ *</label><input name="date" type="date" class="form-control" required value="{% if obj %}{{ obj.date|date:'Y-m-d' }}{% endif %}"></div>
  <div class="form-group full"><label>الوصف</label><input name="description" class="form-control" value="{{ obj.description|default:'' }}"></div>
</div>
<button class="btn btn-primary"><i class="fas fa-save"></i> حفظ</button>
<a href="{% url 'expense_list' %}" class="btn btn-outline">رجوع</a>
</form></div></div>
{% endblock %}
