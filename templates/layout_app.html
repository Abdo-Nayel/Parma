{% extends 'base.html' %}
{% load static %}
{% block body %}
<button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="فتح القائمة">
  <i class="fas fa-bars"></i>
</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app-layout">
  {% include 'partials/sidebar.html' %}
  <main class="main-content">
    <div class="topbar">
      <h2>{{ page_title }}</h2>
      <div class="topbar-actions">
        <a href="{% url 'logout' %}" class="btn-logout"><i class="fas fa-sign-out-alt"></i> خروج</a>
      </div>
    </div>
    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{% if msg.tags == 'error' %}error{% elif msg.tags == 'warning' %}warning{% else %}success{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}
    {% block page_content %}{% endblock %}
  </main>
</div>
<script>
(function() {
  const sidebar = document.getElementById('app-sidebar');
  const toggle = document.getElementById('sidebar-toggle');
  const overlay = document.getElementById('sidebar-overlay');
  if (!sidebar || !toggle) return;

  function openSidebar() {
    sidebar.classList.add('open');
    overlay?.classList.add('visible');
    document.body.classList.add('sidebar-open');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    overlay?.classList.remove('visible');
    document.body.classList.remove('sidebar-open');
  }
  toggle.addEventListener('click', () => {
    sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  overlay?.addEventListener('click', closeSidebar);
  sidebar.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      if (window.innerWidth <= 768) closeSidebar();
    });
  });
})();
</script>
{% endblock %}
