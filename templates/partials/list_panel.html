{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel">
  <div class="panel-header">
    <h3>{{ page_title }}</h3>
    <a href="{{ add_url }}" class="btn btn-sm btn-success"><i class="fas fa-plus"></i> إضافة</a>
  </div>
  <div class="panel-body">
    <form class="search-bar" method="get">
      <input type="text" name="q" class="form-control" placeholder="بحث..." value="{{ q }}">
      <button class="btn btn-primary"><i class="fas fa-search"></i></button>
    </form>
    <table class="data-table">
      <thead><tr>{% block table_head %}{% endblock %}</tr></thead>
      <tbody>{% block table_body %}{% endblock %}</tbody>
    </table>
  </div>
</div>
{% endblock %}
